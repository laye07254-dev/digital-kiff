            background-color: transparent;
            border: none;

            padding: 12px 0;
            color: var(--tw-colors-on-surface);
            width: 100%;
            transition: border-color 0.2s ease;
        }
        input[type="text"]:focus, input[type="email"]:focus, select:focus {
            outline: none;
            border-bottom-color: var(--tw-colors-primary-container);
            box-shadow: none;
        }
        input::placeholder {

<body class="bg-surface-container-lowest text-on-surface font-body-md antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
<!-- Minimal Header for Checkout (Nav Suppressed per rules) -->

<div class="font-headline-md text-headline-md text-on-surface uppercase tracking-tighter">Digital Kiff</div>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary-container transition-colors uppercase tracking-widest flex items-center gap-2" href="#">

        </a>
</header>

<h1 class="font-display-lg text-display-lg text-on-surface mb-[64px] uppercase tracking-tighter">COMMANDE</h1>
<div class="grid grid-cols-1 md:grid-cols-12 gap-[64px] items-start">

<div class="md:col-span-7 flex flex-col gap-[64px]">
<!-- Email Section -->
<section>
<h2 class="font-headline-md text-headline-md mb-gutter uppercase">Contact</h2>
<div class="space-y-6">
<div>
<label class="sr-only" for="email">Email</label>
<input class="font-body-lg text-body-lg" id="email" placeholder="Adresse e-mail" type="email">
</div>
</div>
</section>
<!-- Shipping Address Section -->
<section>
<h2 class="font-headline-md text-headline-md mb-gutter uppercase">Adresse de livraison</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-gutter gap-y-6">
<div class="md:col-span-2">
<label class="sr-only" for="country">Pays</label>
<select class="font-body-lg text-body-lg appearance-none rounded-none cursor-pointer" id="country">
<option value="fr">France</option>
<option value="be">Belgique</option>
<option value="ch">Suisse</option>
</select>
</div>
<div class="md:col-span-1">
<label class="sr-only" for="fname">Prénom</label>
<input class="font-body-lg text-body-lg" id="fname" placeholder="Prénom" type="text">
</div>
<div class="md:col-span-1">
<label class="sr-only" for="lname">Nom</label>
<input class="font-body-lg text-body-lg" id="lname" placeholder="Nom" type="text">
</div>
<div class="md:col-span-2">
<label class="sr-only" for="address">Adresse</label>
<input class="font-body-lg text-body-lg" id="address" placeholder="Adresse" type="text">
</div>
<div class="md:col-span-2">
<label class="sr-only" for="apartment">Appartement, suite, etc. (optionnel)</label>
<input class="font-body-lg text-body-lg" id="apartment" placeholder="Appartement, suite, etc. (optionnel)" type="text">
</div>
<div class="md:col-span-1">
<label class="sr-only" for="postal">Code postal</label>
<input class="font-body-lg text-body-lg" id="postal" placeholder="Code postal" type="text">
</div>
<div class="md:col-span-1">
<label class="sr-only" for="city">Ville</label>
<input class="font-body-lg text-body-lg" id="city" placeholder="Ville" type="text">
</div>
</div>
</section>
<!-- Payment Options Section -->
<section class="mt-8">
<h2 class="font-headline-md text-headline-md mb-gutter uppercase">Paiement</h2>
<div class="flex flex-col gap-4">
<!-- Brutalist styled payment buttons -->
<button class="w-full bg-[#FFC439] text-[#000000] font-bold py-4 px-6 flex items-center justify-center gap-2 hover:opacity-90 transition-opacity border-none rounded-none">
<span class="font-headline-md text-headline-md tracking-tighter"><i>Pay</i><b>Pal</b></span>
</button>
<button class="w-full bg-surface-container-high text-on-surface border border-surface-container-highest py-4 px-6 font-label-sm text-label-sm uppercase tracking-widest hover:border-primary-container hover:text-primary-container transition-colors rounded-none flex justify-center items-center gap-3">
<span class="material-symbols-outlined">credit_card</span>

</div>

<span class="absolute -top-2 -right-2 bg-on-surface text-surface w-6 h-6 flex items-center justify-center rounded-full font-label-sm text-[10px]">1</span>
</div>
<div class="flex-grow flex flex-col justify-between">
<span class="font-body-lg text-body-lg">Affiche Architecturale No. 1</span>
<span class="font-label-sm text-secondary">Format: 50x70cm</span>
</div>
<span class="font-body-lg text-body-lg">85,00 €</span>
</div>
</div>
<div class="border-t border-surface-container-high pt-6 space-y-4">
<div class="flex justify-between font-body-lg text-secondary">
<span class="">Sous-total</span>
<span class="">85,00 €</span>
</div>
<div class="flex justify-between font-body-lg text-secondary">
<span class="">Expédition</span>

</div>
</div>
<div class="border-t border-surface-container-high mt-6 pt-6 flex justify-between items-end">
<span class="font-body-lg text-body-lg uppercase tracking-widest">Total</span>

<span class="font-label-sm text-secondary">EUR</span>
<span class="font-display-lg-mobile text-display-lg-mobile text-primary-container tracking-tighter">85,00 €</span>
